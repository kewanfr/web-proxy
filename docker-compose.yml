services:
  web-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-proxy
    restart: unless-stopped

    ports:
      # Port exposé sur l'hôte → ton reverse proxy pointera ici
      # Modifie le côté gauche si nécessaire (ex: "8443:3000")
      - "${HOST_PORT:-443}:3000"

      # Optionnel: exposer aussi le port HTTP de redirection
      - "${HOST_PORT_HTTP:-80}:${HTTP_REDIRECT_PORT:-8080}"

    environment:
      # Port interne Node.js (ne pas changer sauf si tu modifies le Dockerfile)
      PORT: 3000
      NODE_ENV: production
      HTTPS_ENABLED: ${HTTPS_ENABLED:-false}
      HTTP_REDIRECT_ENABLED: ${HTTP_REDIRECT_ENABLED:-true}
      HTTP_REDIRECT_PORT: ${HTTP_REDIRECT_PORT:-8080}
      HTTPS_PUBLIC_PORT: ${HTTPS_PUBLIC_PORT:-443}
      SSL_KEY_PATH: ${SSL_KEY_PATH:-/certs/privkey.pem}
      SSL_CERT_PATH: ${SSL_CERT_PATH:-/certs/fullchain.pem}
      SSL_CA_PATH: ${SSL_CA_PATH:-}

    # Monter les certificats dans le conteneur (lecture seule)
    # volumes:
    #   - ./certs:/certs:ro

    # Limite les ressources pour un VPS modeste
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M

    # Healthcheck : vérifie que le serveur répond
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$$HTTPS_ENABLED\" = \"true\" ]; then wget --no-check-certificate -qO- https://localhost:3000/; else wget -qO- http://localhost:3000/; fi"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Réseau dédié (utile si tu ajoutes un reverse proxy dans le même compose)
    networks:
      - proxy-net

networks:
  proxy-net:
    name: proxy-net
    # Utilise "external: true" si ton reverse proxy tourne dans un autre stack
    # et partage déjà ce réseau Docker.
    # external: true
